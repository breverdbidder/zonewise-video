name: Render ZoneWise GTM Video v2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps (ffmpeg + Chrome)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg chromium-browser
          echo "CHROME_PATH=$(which chromium-browser)" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Create output directory
        run: mkdir -p out

      - name: Render full video (3 min MP4)
        run: npx @revideo/renderer render src/project.ts --output out/zonewise-demo.mp4
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ env.CHROME_PATH }}

      - name: Render hook clip (Scene 1 — first 25 s)
        run: npx @revideo/renderer render src/project.ts --output out/hook.mp4 --range 0:750
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ env.CHROME_PATH }}

      - name: Convert hook to GIF
        run: |
          ffmpeg -i out/hook.mp4 \
            -vf "fps=15,scale=1280:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse" \
            out/hook.gif

      # ── Artifacts FIRST (before any upload that might fail) ─────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zonewise-gtm-v2
          path: |
            out/zonewise-demo.mp4
            out/hook.mp4
            out/hook.gif
          retention-days: 30

      # ── Supabase upload (best-effort) ────────────────────────────────
      - name: Upload to Supabase Storage
        continue-on-error: true
        run: |
          curl -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/edp-screenshots/video/zonewise-demo-v2.mp4" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: video/mp4" \
            --data-binary @out/zonewise-demo.mp4

          curl -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/edp-screenshots/video/hook-v2.gif" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: image/gif" \
            --data-binary @out/hook.gif
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # ── Comment on issue #202 ────────────────────────────────────────
      - name: Comment on issue #202
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const supaUrl = process.env.SUPABASE_URL || '';
            const videoUrl = supaUrl
              ? `${supaUrl}/storage/v1/object/public/edp-screenshots/video/zonewise-demo-v2.mp4`
              : '_(Supabase upload skipped — download from Actions artifacts)_';
            const gifUrl = supaUrl
              ? `${supaUrl}/storage/v1/object/public/edp-screenshots/video/hook-v2.gif`
              : '_(download from Actions artifacts)_';

            await github.rest.issues.createComment({
              owner: 'breverdbidder',
              repo: 'cli-anything-biddeed',
              issue_number: 202,
              body: `## 🎬 ZoneWise GTM Video V2 — Rendered

            **Framework:** Revideo (Motion Canvas fork) — headless, no Remotion
            **Design:** Light mode — white/navy/#F59E0B, Apple keynote aesthetic
            **Duration:** 3:00 (180 s · 5400 frames @ 30 fps)

            ---

            **Full 3-min MP4:** ${videoUrl}

            **Hook clip GIF (Scene 1 — first 25 s):** ${gifUrl}

            ---

            ### Scene Breakdown

            | # | Scene | Time | Duration | Theme |
            |---|-------|------|----------|-------|
            | 1 | THE PAIN | 0:00–0:25 | 25 s | $47k→$189k gap with scramble decode |
            | 2 | THE OLD WAY | 0:25–0:50 | 25 s | Spreadsheet chaos → stat build-up |
            | 3 | THE BREAKTHROUGH | 0:50–1:05 | 15 s | ZoneWise.AI logo reveal |
            | 4 | 12-STEP PIPELINE | 1:05–1:50 | 45 s | Cards spring in + PATENT PENDING stamp |
            | 5 | THE PRODUCT | 1:50–2:25 | 35 s | Dashboard + map + chat + alert |
            | 6 | THE MOAT | 2:25–2:45 | 20 s | Pyramid layers + exponential curve |
            | 7 | CTA | 2:45–3:00 | 15 s | Buttons + logo + fade to white |

            ---

            Rendered by GitHub Actions run [\`${{ github.run_id }}\`](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            Commit: \`${{ github.sha }}\`
            `
            });
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
