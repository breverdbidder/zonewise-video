name: Render ZoneWise Hollywood Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Create output directory
        run: mkdir -p out

      - name: Render full video
        run: |
          npx remotion render src/index.ts ZoneWiseV2 out/zonewise-demo.mp4 \
            --fps=30 \
            --width=1920 \
            --height=1080 \
            --concurrency=4
        env:
          REMOTION_ALLOW_AUDIO: "false"

      - name: Render hook clip (first 25s)
        run: |
          npx remotion render src/index.ts ZoneWiseHook out/hook.mp4 \
            --fps=30 \
            --width=1920 \
            --height=1080
        continue-on-error: true

      - name: Convert hook to GIF
        run: |
          ffmpeg -i out/hook.mp4 \
            -vf "fps=15,scale=1280:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse" \
            out/hook.gif
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zonewise-hollywood
          path: |
            out/zonewise-demo.mp4
            out/hook.mp4
            out/hook.gif
          retention-days: 30
